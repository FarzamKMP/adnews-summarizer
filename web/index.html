<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdDigest — News Intelligence</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .run-hero { text-align: center; padding: 48px 0 36px; }
    .run-hero h1 { margin-bottom: 10px; font-size: 2rem; }
    .run-hero p { margin-bottom: 32px; line-height: 1.7; }
    #run-btn { font-size: 1rem; padding: 14px 44px; }
    .step-status { font-size: .85rem; color: var(--text-muted); text-align: center; min-height: 22px; margin-bottom: 20px; }
    .linkedin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .linkedin-header h2 { margin-bottom: 0; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">AdDigest</span>
    <a href="index.html" class="active">News</a>
    <a href="chat.html">Jonas AI</a>
    <a href="persona.html">Persona</a>
  </nav>

  <div class="page">

    <div class="run-hero">
      <h1>Advertising News Digest</h1>
      <p class="subtitle">Crawls Adweek, AdAge, Digiday, MarketingWeek, CampaignLive,<br>WARC, W&amp;V and Horizont — last 7 days — then builds a LinkedIn article.</p>
      <button id="run-btn">Run Full Digest</button>
    </div>

    <div class="progress-bar" id="progress-bar" style="display:none">
      <div class="fill" id="progress-fill"></div>
    </div>
    <div class="step-status" id="step-status"></div>

    <div id="articles-section" style="display:none">
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:16px 20px 14px;border-bottom:1px solid rgba(180,200,240,.35);display:flex;align-items:center;gap:10px">
          <h2 style="margin:0">Articles Found</h2>
          <span id="articles-count" style="font-size:.8rem;color:var(--text-muted)"></span>
        </div>
        <table class="articles-table" id="articles-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Source</th>
              <th>Published</th>
              <th>Summary</th>
            </tr>
          </thead>
          <tbody id="articles-body"></tbody>
        </table>
      </div>
    </div>

    <div id="linkedin-section" style="display:none;margin-top:24px">
      <div class="card">
        <div class="linkedin-header">
          <h2>Generated LinkedIn Article</h2>
          <button id="copy-btn" class="secondary small">Copy</button>
        </div>
        <div id="article-box" class="article-box"></div>
        <div id="sources-list" style="margin-top:14px;font-size:.80rem;color:var(--text-muted);line-height:1.9"></div>
      </div>
    </div>

  </div>

  <script>
    const API = 'http://127.0.0.1:8000';
    const runBtn   = document.getElementById('run-btn');
    const stepEl   = document.getElementById('step-status');
    const progBar  = document.getElementById('progress-bar');
    const progFill = document.getElementById('progress-fill');

    function setStep(msg, pct) {
      stepEl.textContent = msg;
      stepEl.className = 'step-status' + (pct === 0 ? ' error' : '');
      progFill.style.width = pct + '%';
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderArticles(articles) {
      document.getElementById('articles-section').style.display = '';
      document.getElementById('articles-count').textContent = articles.length + ' articles';
      const tbody = document.getElementById('articles-body');
      tbody.innerHTML = '';
      articles.forEach(a => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="title-cell"><a href="${a.url}" target="_blank">${a.title}</a></td>
          <td><span class="source-badge">${a.source}</span></td>
          <td class="date-cell">${fmtDate(a.published_at)}</td>
          <td class="summary-cell">${a.summary || ''}</td>`;
        tbody.appendChild(tr);
      });
    }

    function renderLinkedIn(data) {
      document.getElementById('linkedin-section').style.display = '';
      document.getElementById('article-box').textContent = data.linkedin_article;
      document.getElementById('sources-list').innerHTML =
        '<strong>Sources:</strong><br>' +
        data.sources.map(s =>
          `<a href="${s.url}" target="_blank" style="color:var(--accent)">${s.title}</a> <span class="source-badge">${s.source}</span>`
        ).join('<br>');
    }

    runBtn.addEventListener('click', async () => {
      runBtn.disabled = true;
      progBar.style.display = '';
      progFill.style.background = 'linear-gradient(90deg, var(--accent), var(--accent2))';
      document.getElementById('articles-section').style.display = 'none';
      document.getElementById('linkedin-section').style.display = 'none';

      try {
        setStep('Crawling all 8 sources for the last 7 days…', 20);
        const res = await fetch(`${API}/api/digest`, { method: 'POST' });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }
        setStep('Generating LinkedIn article…', 80);
        const data = await res.json();
        setStep(`Done — ${data.articles_found} articles · article ready`, 100);
        renderArticles(data.articles);
        renderLinkedIn(data);
      } catch (e) {
        progFill.style.background = 'var(--danger)';
        setStep('Error: ' + e.message, 0);
      } finally {
        runBtn.disabled = false;
      }
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('article-box').textContent).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      });
    });
  </script>
</body>
</html>
