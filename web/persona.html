<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdDigest — Persona</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <span class="logo">AdDigest</span>
    <a href="index.html">News</a>
    <a href="chat.html">Jonas AI</a>
    <a href="persona.html" class="active">Persona</a>
  </nav>

  <div class="page">
    <h1>Persona Manager</h1>
    <p class="subtitle">Jonas Bailly's knowledge base — everything the AI knows about his style, values and preferences.</p>

    <div class="card" style="margin-bottom:28px">
      <h2>Add Note</h2>
      <div style="display:flex;flex-direction:column;gap:10px">
        <input type="text" id="note-title" placeholder="Title — e.g. Decision-making style, Communication preference…" />
        <textarea id="note-content" placeholder="Describe the trait, preference, rule or example…"></textarea>
        <input type="text" id="note-tags" placeholder="Tags (comma-separated) — e.g. style, values, decisions" />
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button id="add-note-btn">Add to Knowledge Base</button>
          <button id="reindex-btn" class="secondary">Re-index all</button>
          <span id="add-status" class="status" style="margin:0"></span>
        </div>
      </div>
    </div>

    <div class="section-header">
      <h2>Knowledge Base</h2>
      <input type="text" id="filter-tag" placeholder="Filter by tag…" style="width:150px;padding:7px 12px;font-size:.83rem" />
      <button id="filter-btn" class="secondary small">Filter</button>
      <button id="clear-filter-btn" class="secondary small">All</button>
    </div>

    <div id="notes-list"></div>
  </div>

  <!-- Edit modal -->
  <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(180,200,240,0.35);backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center">
    <div class="card" style="width:90%;max-width:560px;padding:28px">
      <h2 style="margin-bottom:18px">Edit Note</h2>
      <input type="hidden" id="edit-id" />
      <input type="text" id="edit-title" style="width:100%;margin-bottom:10px" placeholder="Title" />
      <textarea id="edit-content" style="min-height:120px;margin-bottom:10px" placeholder="Content"></textarea>
      <input type="text" id="edit-tags" style="width:100%;margin-bottom:18px" placeholder="Tags" />
      <div style="display:flex;gap:8px">
        <button id="save-edit-btn">Save</button>
        <button id="cancel-edit-btn" class="secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:8000';

    async function loadNotes(tag) {
      const url = tag ? `${API}/api/persona/notes?tag=${encodeURIComponent(tag)}` : `${API}/api/persona/notes`;
      const notes = await fetch(url).then(r => r.json());
      renderNotes(notes);
    }

    function renderNotes(notes) {
      const list = document.getElementById('notes-list');
      list.innerHTML = '';
      if (!notes.length) { list.innerHTML = '<p class="status">No notes found.</p>'; return; }
      notes.forEach(n => {
        const d = document.createElement('div');
        d.className = 'card note-card' + (n.is_seed ? ' seed' : '');
        const tags = (n.tags || '').split(',').filter(Boolean).map(t => `<span class="tag">${t.trim()}</span>`).join('');
        const seedBadge = n.is_seed ? '<span class="tag" style="background:rgba(91,124,250,.15)">seed</span>' : '';
        d.innerHTML = `
          <h3>${n.title} ${seedBadge}</h3>
          <p style="font-size:.86rem;color:var(--text-muted);margin:8px 0 10px;line-height:1.6;white-space:pre-wrap">${n.content}</p>
          <div style="margin-bottom:4px">${tags}</div>
          <div class="meta"><span>${new Date(n.created_at).toLocaleDateString('en-US',{dateStyle:'medium'})}</span></div>
          <div class="actions">
            <button class="secondary small" onclick="openEdit('${n.id}','${esc(n.title)}','${esc(n.content)}','${esc(n.tags)}')">Edit</button>
            <button class="danger small" onclick="del('${n.id}')">Delete</button>
          </div>`;
        list.appendChild(d);
      });
    }

    function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n'); }

    document.getElementById('add-note-btn').addEventListener('click', async () => {
      const title   = document.getElementById('note-title').value.trim();
      const content = document.getElementById('note-content').value.trim();
      const tags    = document.getElementById('note-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
      const st = document.getElementById('add-status');
      if (!title || !content) { st.textContent='Title and content required.'; st.className='status error'; return; }
      st.textContent='Adding…'; st.className='status loading';
      try {
        const res = await fetch(`${API}/api/persona/notes`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({title, content, tags})
        });
        if (!res.ok) throw new Error(await res.text());
        st.textContent='Added and indexed.'; st.className='status success';
        document.getElementById('note-title').value='';
        document.getElementById('note-content').value='';
        document.getElementById('note-tags').value='';
        loadNotes();
      } catch(e) { st.textContent='Error: '+e.message; st.className='status error'; }
    });

    document.getElementById('reindex-btn').addEventListener('click', async () => {
      const st = document.getElementById('add-status');
      st.textContent='Re-indexing…'; st.className='status loading';
      try {
        const d = await fetch(`${API}/api/rag/reindex`,{method:'POST'}).then(r=>r.json());
        st.textContent=`Re-indexed ${d.reindexed} notes.`; st.className='status success';
      } catch(e) { st.textContent='Error: '+e.message; st.className='status error'; }
    });

    document.getElementById('filter-btn').addEventListener('click', () => loadNotes(document.getElementById('filter-tag').value.trim()));
    document.getElementById('clear-filter-btn').addEventListener('click', () => { document.getElementById('filter-tag').value=''; loadNotes(); });

    async function del(id) {
      if (!confirm('Delete this note?')) return;
      await fetch(`${API}/api/persona/notes/${id}`,{method:'DELETE'});
      loadNotes();
    }

    function openEdit(id,title,content,tags) {
      document.getElementById('edit-id').value=id;
      document.getElementById('edit-title').value=title.replace(/\\n/g,'\n');
      document.getElementById('edit-content').value=content.replace(/\\n/g,'\n');
      document.getElementById('edit-tags').value=tags;
      document.getElementById('modal').style.display='flex';
    }

    document.getElementById('cancel-edit-btn').addEventListener('click', () => { document.getElementById('modal').style.display='none'; });

    document.getElementById('save-edit-btn').addEventListener('click', async () => {
      const id      = document.getElementById('edit-id').value;
      const title   = document.getElementById('edit-title').value.trim();
      const content = document.getElementById('edit-content').value.trim();
      const tags    = document.getElementById('edit-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
      await fetch(`${API}/api/persona/notes/${id}`,{
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({title,content,tags})
      });
      document.getElementById('modal').style.display='none';
      loadNotes();
    });

    loadNotes();
  </script>
</body>
</html>
